<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeechCentor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0f19;
        }
        .glass {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.3);
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(99, 102, 241, 0.5);
        }
    </style>
</head>
<body class="text-slate-100 h-screen w-screen overflow-hidden flex flex-col antialiased">

    <div id="setup-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-[#090d16] p-4 hidden">
        <div class="glass max-w-md w-full rounded-2xl p-8 shadow-2xl border border-indigo-500/20 text-center">
            <div class="w-16 h-16 bg-gradient-to-tr from-indigo-500 to-purple-500 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-indigo-500/20">
                <i data-lucide="message-square" class="w-8 h-8 text-white"></i>
            </div>
            <h2 class="text-2xl font-bold mb-2 tracking-tight">Welcome to SpeechCentor</h2>
            <p class="text-sm text-slate-400 mb-6">Create your universal unique profile to enter the hub.</p>
            
            <div class="space-y-4 text-left">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Display Name</label>
                    <input type="text" id="setup-displayname" placeholder="e.g. Alex" class="w-full bg-slate-900/60 border border-slate-700/50 rounded-xl px-4 py-3 text-slate-100 placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition-all">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Unique @Username</label>
                    <input type="text" id="setup-username" placeholder="e.g. alex_dev (Letters, numbers, underscores)" class="w-full bg-slate-900/60 border border-slate-700/50 rounded-xl px-4 py-3 text-slate-100 placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition-all">
                    <p id="setup-error" class="text-rose-400 text-xs mt-2 hidden"></p>
                </div>
                <button id="btn-create-profile" class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-medium py-3 rounded-xl shadow-lg shadow-indigo-500/20 transition-all transform hover:-translate-y-0.5 active:translate-y-0 flex items-center justify-center gap-2">
                    Initialize Profile <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </div>

    <div id="app-container" class="flex flex-1 h-full w-full overflow-hidden opacity-30 pointer-events-none transition-opacity duration-300">
        
        <aside class="w-72 bg-[#0d121f] border-r border-slate-800/60 flex flex-col justify-between select-none">
            <div>
                <div class="h-16 border-b border-slate-800/60 flex items-center justify-between px-4">
                    <div class="flex items-center gap-2.5">
                        <span class="w-3 h-3 rounded-full bg-indigo-500 animate-pulse"></span>
                        <h1 class="font-bold text-lg tracking-wide bg-clip-text text-transparent bg-gradient-to-r from-slate-100 to-slate-300">SpeechCentor</h1>
                    </div>
                </div>

                <div class="p-3 space-y-1">
                    <div class="text-xs font-bold text-slate-500 px-2 py-2 uppercase tracking-widest">Global Areas</div>
                    <div class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-gradient-to-r from-indigo-500/10 to-transparent border-l-2 border-indigo-500 text-slate-100 font-medium cursor-pointer">
                        <i data-lucide="hash" class="w-4 h-4 text-indigo-400"></i>
                        <span>global-chat</span>
                    </div>
                </div>
            </div>

            <div class="p-3 bg-[#0a0e19] border-t border-slate-800/60 flex items-center justify-between gap-2">
                <div class="flex items-center gap-2.5 min-w-0 cursor-pointer hover:bg-slate-800/30 p-1.5 rounded-xl transition-all flex-1" id="btn-open-settings">
                    <div class="relative flex-shrink-0">
                        <img id="my-avatar" src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=150" class="w-10 h-10 rounded-xl object-cover ring-2 ring-indigo-500/20">
                        <span class="absolute bottom-0 right-0 w-3 h-3 bg-emerald-500 rounded-full ring-2 ring-[#0a0e19]"></span>
                    </div>
                    <div class="min-w-0 flex-1">
                        <div id="my-displayname" class="font-semibold text-sm truncate text-slate-200">Loading...</div>
                        <div id="my-handle" class="text-xs text-slate-400 truncate">@username</div>
                    </div>
                </div>
                <button id="btn-settings-icon" class="p-2 text-slate-400 hover:text-slate-200 hover:bg-slate-800/50 rounded-xl transition-all">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col bg-[#0f1626] relative">
            <header class="h-16 border-b border-slate-800/60 px-6 flex items-center justify-between shadow-sm">
                <div class="flex items-center gap-2">
                    <i data-lucide="hash" class="w-5 h-5 text-slate-400"></i>
                    <span class="font-semibold text-slate-200">global-chat</span>
                    <span class="mx-2 text-slate-600">|</span>
                    <span class="text-xs text-slate-400 hidden sm:inline">Welcome to the epicenter of conversation.</span>
                </div>
            </header>

            <div id="chat-messages" class="flex-1 overflow-y-auto p-6 space-y-6 custom-scrollbar">
                </div>

            <div class="p-4 bg-gradient-to-t from-[#0f1626] via-[#0f1626] to-transparent">
                <form id="chat-form" class="glass rounded-xl px-4 py-3 flex items-center gap-3 shadow-lg focus-within:border-indigo-500/50 transition-all">
                    <input type="text" id="chat-input" autocomplete="off" placeholder="Message #global-chat" class="bg-transparent flex-1 text-slate-200 placeholder-slate-500 focus:outline-none text-sm">
                    <button type="submit" class="p-2 bg-indigo-500 hover:bg-indigo-600 text-white rounded-lg shadow-md shadow-indigo-500/10 transition-all">
                        <i data-lucide="send" class="w-4 h-4"></i>
                    </button>
                </form>
            </div>
        </main>
    </div>

    <div id="settings-modal" class="fixed inset-0 z-50 bg-black/70 backdrop-blur-md flex items-center justify-center p-4 hidden">
        <div class="glass max-w-lg w-full rounded-2xl overflow-hidden shadow-2xl border border-slate-700/40 transform scale-95 transition-all duration-300" id="settings-card">
            
            <div class="relative h-36 bg-gradient-to-r from-indigo-600 to-purple-600" id="profile-banner-preview">
                <label class="absolute inset-0 bg-black/40 opacity-0 hover:opacity-100 flex items-center justify-center transition-all cursor-pointer text-sm font-medium gap-2">
                    <i data-lucide="camera" class="w-4 h-4"></i> Change Banner
                    <input type="file" id="input-banner" accept="image/*" class="hidden">
                </label>
                <button id="btn-close-settings" class="absolute top-3 right-3 p-1.5 bg-black/40 hover:bg-black/60 text-white rounded-full transition-all">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>

            <div class="px-6 pb-6 relative pt-14">
                <div class="absolute -top-12 left-6 relative w-24 h-24 rounded-2xl overflow-hidden ring-4 ring-[#0f1626] bg-slate-800 group">
                    <img id="profile-avatar-preview" src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=150" class="w-full h-full object-cover">
                    <label class="absolute inset-0 bg-black/50 opacity-0 hover:opacity-100 flex items-center justify-center transition-all cursor-pointer text-white">
                        <i data-lucide="camera" class="w-5 h-5"></i>
                        <input type="file" id="input-avatar" accept="image/*" class="hidden">
                    </label>
                </div>

                <div class="mt-4 space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Display Name</label>
                            <input type="text" id="edit-displayname" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3.5 py-2 text-sm text-slate-100 focus:outline-none focus:border-indigo-500 transition-all">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">User Unique Identifier</label>
                            <input type="text" id="edit-uid" readonly class="w-full bg-slate-900/40 border border-slate-800/80 rounded-xl px-3.5 py-2 text-sm text-slate-500 cursor-not-allowed outline-none">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Your System Handle</label>
                        <input type="text" id="edit-username" readonly class="w-full bg-slate-900/40 border border-slate-800/80 rounded-xl px-3.5 py-2 text-sm text-slate-500 cursor-not-allowed outline-none">
                        <p class="text-[11px] text-slate-500 mt-1">System usernames cannot be altered after system reservation.</p>
                    </div>

                    <div class="pt-2 flex justify-end gap-3 border-t border-slate-800">
                        <button id="btn-save-profile" class="bg-indigo-500 hover:bg-indigo-600 text-white text-sm font-medium px-5 py-2.5 rounded-xl shadow-lg shadow-indigo-500/10 transition-all transform hover:-translate-y-0.5 active:translate-y-0">
                            Save Changes
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

        // Requested Firebase App Parameters Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAMAiYmLy2k5feaWbUHE7n5TUNlZGAr6nk",
            authDomain: "speechcentor.firebaseapp.com",
            projectId: "speechcentor",
            storageBucket: "speechcentor.firebasestorage.app",
            messagingSenderId: "804696408540",
            appId: "1:804696408540:web:855cae2217b55dca0a4f19",
            measurementId: "G-HQ93JH0QCJ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Client State Controller Variables
        let currentUser = null;
        const localSessionKey = "SPEECHCENTOR_UID";

        // Global Helper: Creates uniquely valid identifiers natively (e.g., SC-4921-8293)
        function generateUniqueId() {
            const block = () => Math.floor((1 + Math.random()) * 0x10000).toString(16).substring(1).toUpperCase();
            return `SC-${block()}-${block()}`;
        }

        // Processing utility converting image payloads to compressed, lightweight web URLs
        function processImageToUrl(file, maxWidth, maxHeight) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > maxWidth) {
                                height *= maxWidth / width;
                                width = maxWidth;
                            }
                        } else {
                            if (height > maxHeight) {
                                width *= maxHeight / height;
                                height = maxHeight;
                            }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7)); 
                    };
                };
                reader.onerror = error => reject(error);
            });
        }

        // App Initializer Setup check
        window.addEventListener('DOMContentLoaded', async () => {
            lucide.createIcons();
            const storedUid = localStorage.getItem(localSessionKey);

            if (storedUid) {
                const userDoc = await getDoc(doc(db, "users", storedUid));
                if (userDoc.exists()) {
                    currentUser = userDoc.data();
                    bootstrapDashboard();
                } else {
                    showSetupScreen();
                }
            } else {
                showSetupScreen();
            }
        });

        function showSetupScreen() {
            document.getElementById('setup-screen').classList.remove('hidden');
        }

        // Handles Registration and Unique Username Locking Matrix Flow
        document.getElementById('btn-create-profile').addEventListener('click', async () => {
            const displayName = document.getElementById('setup-displayname').value.trim();
            const usernameInput = document.getElementById('setup-username').value.trim().toLowerCase();
            const errorEl = document.getElementById('setup-error');

            errorEl.classList.add('hidden');

            if (!displayName || !usernameInput) {
                errorEl.textContent = "Please fill in all layout fields.";
                errorEl.classList.remove('hidden');
                return;
            }

            const usernameRegex = /^[a-zA-Z0-9_.]+$/;
            if (!usernameRegex.test(usernameInput)) {
                errorEl.textContent = "Handle format invalid (Alphanumeric/Underscores only).";
                errorEl.classList.remove('hidden');
                return;
            }

            try {
                // Check uniqueness constraints via the reserved lookup collection
                const reservedUserRef = doc(db, "usernames", usernameInput);
                const reservedSnap = await getDoc(reservedUserRef);

                if (reservedSnap.exists()) {
                    errorEl.textContent = "This handle is already registered by another operator.";
                    errorEl.classList.remove('hidden');
                    return;
                }

                // Provision unique system properties
                const newUid = generateUniqueId();
                const defaultAvatar = `https://api.dicebear.com/7.x/identicon/svg?seed=${usernameInput}`;
                const defaultBanner = "linear-gradient(135deg, #6366f1 0%, #a855f7 100%)";

                const profileData = {
                    userId: newUid,
                    username: usernameInput,
                    displayName: displayName,
                    avatarUrl: defaultAvatar,
                    bannerUrl: defaultBanner
                };

                // Double Atomic Registration Lock
                await setDoc(doc(db, "usernames", usernameInput), { uid: newUid });
                await setDoc(doc(db, "users", newUid), profileData);

                localStorage.setItem(localSessionKey, newUid);
                currentUser = profileData;

                document.getElementById('setup-screen').classList.add('hidden');
                bootstrapDashboard();

            } catch (err) {
                console.error(err);
                errorEl.textContent = "System validation structural error occurred.";
                errorEl.classList.remove('hidden');
            }
        });

        // Interface Bootstrap Data Pipeline Hydration
        function bootstrapDashboard() {
            const appContainer = document.getElementById('app-container');
            appContainer.classList.remove('opacity-30', 'pointer-events-none');

            // Set UI details
            updateLocalProfileUI();
            
            // Listen to messages
            const chatQuery = query(collection(db, "messages"), orderBy("timestamp", "asc"));
            onSnapshot(chatQuery, (snapshot) => {
                const chatLog = document.getElementById('chat-messages');
                chatLog.innerHTML = "";
                
                snapshot.forEach((msgDoc) => {
                    const data = msgDoc.data();
                    appendMessageNode(data);
                });
                chatLog.scrollTop = chatLog.scrollHeight;
            });
        }

        function updateLocalProfileUI() {
            document.getElementById('my-displayname').textContent = currentUser.displayName;
            document.getElementById('my-handle').textContent = `@${currentUser.username}`;
            document.getElementById('my-avatar').src = currentUser.avatarUrl;

            // Load values inside modal settings card
            document.getElementById('edit-displayname').value = currentUser.displayName;
            document.getElementById('edit-uid').value = currentUser.userId;
            document.getElementById('edit-username').value = `@${currentUser.username}`;
            document.getElementById('profile-avatar-preview').src = currentUser.avatarUrl;
            
            const bannerPreview = document.getElementById('profile-banner-preview');
            if (currentUser.bannerUrl.startsWith("data:") || currentUser.bannerUrl.startsWith("http")) {
                bannerPreview.style.background = `url('${currentUser.bannerUrl}') center/cover no-repeat`;
            } else {
                bannerPreview.style.background = currentUser.bannerUrl;
            }
        }

        // Real-time Chat Messaging Logic
        document.getElementById('chat-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('chat-input');
            const messageText = input.value.trim();

            if (!messageText) return;

            input.value = "";

            await addDoc(collection(db, "messages"), {
                text: messageText,
                senderId: currentUser.userId,
                senderName: currentUser.displayName,
                senderUsername: currentUser.username,
                senderAvatar: currentUser.avatarUrl,
                timestamp: Date.now()
            });
        });

        function appendMessageNode(data) {
            const container = document.getElementById('chat-messages');
            const msgHtml = `
                <div class="flex items-start gap-4 hover:bg-slate-800/20 p-2 rounded-xl transition-all group">
                    <img src="${data.senderAvatar}" class="w-10 h-10 rounded-xl object-cover bg-slate-800 flex-shrink-0 mt-0.5">
                    <div class="min-w-0 flex-1">
                        <div class="flex items-baseline gap-2 mb-0.5">
                            <span class="font-semibold text-sm text-slate-200">${data.senderName}</span>
                            <span class="text-xs text-indigo-400 font-medium">@${data.senderUsername}</span>
                            <span class="text-[10px] text-slate-500 font-normal opacity-0 group-hover:opacity-100 transition-opacity">${new Date(data.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                        </div>
                        <p class="text-sm text-slate-300 break-words leading-relaxed">${escapeHtml(data.text)}</p>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', msgHtml);
        }

        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        // Profile Settings & Custom Asset Compression Layer Engine
        const settingsModal = document.getElementById('settings-modal');
        
        const openSettings = () => { settingsModal.classList.remove('hidden'); updateLocalProfileUI(); };
        const closeSettings = () => { settingsModal.classList.add('hidden'); };

        document.getElementById('btn-open-settings').addEventListener('click', openSettings);
        document.getElementById('btn-settings-icon').addEventListener('click', openSettings);
        document.getElementById('btn-close-settings').addEventListener('click', closeSettings);

        // Realtime Avatar Upload Handling Conversion
        document.getElementById('input-avatar').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                const dataUrl = await processImageToUrl(file, 250, 250);
                document.getElementById('profile-avatar-preview').src = dataUrl;
                currentUser.avatarUrl = dataUrl; 
            }
        });

        // Realtime Banner Upload Handling Conversion
        document.getElementById('input-banner').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                const dataUrl = await processImageToUrl(file, 800, 300);
                document.getElementById('profile-banner-preview').style.background = `url('${dataUrl}') center/cover no-repeat`;
                currentUser.bannerUrl = dataUrl;
            }
        });

        // Synchronize and Save Updated Profile
        document.getElementById('btn-save-profile').addEventListener('click', async () => {
            const displayTitle = document.getElementById('edit-displayname').value.trim();
            if (!displayTitle) return;

            currentUser.displayName = displayTitle;

            await setDoc(doc(db, "users", currentUser.userId), currentUser);
            updateLocalProfileUI();
            closeSettings();
        });
    </script>
</body>
</html>
