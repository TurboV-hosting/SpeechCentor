<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeechCentor Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b0f19; }
        .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.1); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.3); border-radius: 4px; }
    </style>
</head>
<body class="text-slate-100 h-screen w-screen overflow-hidden flex antialiased select-none">

    <div id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-[#090d16] p-4">
        <div class="glass max-w-md w-full rounded-2xl p-8 shadow-2xl border border-indigo-500/20 text-center">
            <div class="w-14 h-14 bg-gradient-to-tr from-indigo-500 to-purple-500 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                <i data-lucide="shield" class="w-7 h-7 text-white"></i>
            </div>
            <h2 id="auth-title" class="text-2xl font-bold mb-1 tracking-tight">Access SpeechCentor</h2>
            <p id="auth-subtitle" class="text-xs text-slate-400 mb-6">Sign in or register a new identity profile matrix.</p>
            
            <div class="space-y-4 text-left">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Email Address</label>
                    <input type="email" id="auth-email" placeholder="name@domain.com" class="w-full bg-slate-900 border border-slate-700/50 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-indigo-500 text-slate-200">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Password</label>
                    <input type="password" id="auth-password" placeholder="••••••••" class="w-full bg-slate-900 border border-slate-700/50 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-indigo-500 text-slate-200">
                </div>

                <div id="auth-register-fields" class="hidden space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Display Name</label>
                        <input type="text" id="auth-displayname" placeholder="Alex" class="w-full bg-slate-900 border border-slate-700/50 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-indigo-500 text-slate-200">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Unique @Handle</label>
                        <input type="text" id="auth-handle" placeholder="alex_dev" class="w-full bg-slate-900 border border-slate-700/50 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-indigo-500 text-slate-200">
                    </div>
                </div>

                <p id="auth-error" class="text-rose-400 text-xs hidden"></p>

                <button id="btn-auth-primary" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-medium py-2.5 rounded-xl transition-all shadow-md">Sign In</button>
                <div class="text-center mt-4">
                    <button id="btn-auth-toggle" class="text-xs text-indigo-400 hover:underline">Need a platform account? Register</button>
                </div>
            </div>
        </div>
    </div>

    <div id="app-container" class="hidden flex flex-1 h-full w-full overflow-hidden">
        
        <nav class="w-18 bg-[#080b12] flex flex-col items-center py-4 gap-3 border-r border-slate-900/60 flex-shrink-0">
            <button id="nav-dm-hub" class="w-12 h-12 rounded-2xl bg-indigo-500/10 text-indigo-400 hover:bg-indigo-500 hover:text-white flex items-center justify-center transition-all group relative">
                <i data-lucide="message-square" class="w-5 h-5"></i>
                <span class="absolute left-20 bg-slate-950 px-2 py-1 rounded text-xs hidden group-hover:block whitespace-nowrap z-40">Direct Messages</span>
            </button>
            <div class="w-8 h-[2px] bg-slate-800 rounded"></div>
            
            <div id="server-list" class="flex flex-col gap-3 overflow-y-auto custom-scrollbar w-full items-center"></div>

            <button id="btn-create-server-trigger" class="w-12 h-12 rounded-full border border-dashed border-slate-700 hover:border-emerald-500 text-slate-400 hover:text-emerald-400 flex items-center justify-center transition-all mt-auto group relative">
                <i data-lucide="plus" class="w-5 h-5"></i>
                <span class="absolute left-20 bg-slate-950 px-2 py-1 rounded text-xs hidden group-hover:block whitespace-nowrap z-40">Create Server</span>
            </button>
            <button id="btn-join-server-trigger" class="w-12 h-12 rounded-full border border-dashed border-slate-700 hover:border-indigo-500 text-slate-400 hover:text-indigo-400 flex items-center justify-center transition-all group relative">
                <i data-lucide="compass" class="w-5 h-5"></i>
                <span class="absolute left-20 bg-slate-950 px-2 py-1 rounded text-xs hidden group-hover:block whitespace-nowrap z-40">Join via Invite</span>
            </button>
        </nav>

        <aside class="w-64 bg-[#0c101b] border-r border-slate-900 flex flex-col justify-between flex-shrink-0">
            <div class="flex-1 flex flex-col overflow-hidden">
                <div class="h-14 border-b border-slate-900 flex items-center px-4 font-bold text-sm tracking-wide text-slate-200 shadow-sm justify-between" id="sidebar-header-title">
                    <span>SpeechCentor Hub</span>
                </div>
                <div id="sidebar-context-content" class="p-2 overflow-y-auto custom-scrollbar flex-1 space-y-4"></div>
            </div>

            <div class="p-3 bg-[#070a12] border-t border-slate-900 flex items-center justify-between gap-2">
                <div class="flex items-center gap-2 min-w-0 p-1 rounded-xl transition-all flex-1 cursor-pointer hover:bg-slate-800/40" id="btn-my-settings">
                    <img id="my-avatar" src="" class="w-9 h-9 rounded-xl object-cover bg-slate-800">
                    <div class="min-w-0 flex-1">
                        <div id="my-displayname" class="font-semibold text-xs truncate text-slate-200">User</div>
                        <div id="my-handle" class="text-[10px] text-slate-500 truncate">@handle</div>
                    </div>
                </div>
                <button id="btn-logout" class="p-2 text-slate-500 hover:text-rose-400 transition-all rounded-lg"><i data-lucide="log-out" class="w-4 h-4"></i></button>
            </div>
        </aside>

        <main class="flex-1 bg-[#0f1524] flex flex-col relative overflow-hidden">
            <header class="h-14 border-b border-slate-900 px-6 flex items-center justify-between shadow-sm flex-shrink-0">
                <div class="flex items-center gap-2" id="main-header-pane">
                    <i data-lucide="message-square" class="w-4 h-4 text-slate-400"></i>
                    <span class="font-semibold text-sm text-slate-200" id="main-header-title">Select Context Channel</span>
                </div>
                <div id="server-action-controls" class="hidden flex items-center gap-2">
                    <button id="btn-gen-invite" class="text-xs bg-indigo-600/20 text-indigo-400 border border-indigo-500/20 hover:bg-indigo-600 hover:text-white px-2.5 py-1 rounded-lg transition-all flex items-center gap-1">
                        <i data-lucide="user-plus" class="w-3.5 h-3.5"></i> Invite Code
                    </button>
                    <button id="btn-create-channel-modal" class="text-xs bg-slate-800 hover:bg-slate-700 px-2.5 py-1 rounded-lg transition-all flex items-center gap-1 hidden">
                        <i data-lucide="plus" class="w-3.5 h-3.5"></i> Add Channel
                    </button>
                </div>
            </header>

            <div id="chat-viewport-messages" class="flex-1 overflow-y-auto p-6 space-y-4 custom-scrollbar"></div>

            <div class="p-4 bg-gradient-to-t from-[#0f1524] to-transparent flex-shrink-0 hidden" id="chat-input-bar">
                <form id="chat-form" class="glass rounded-xl px-4 py-3 flex items-center gap-3">
                    <input type="text" id="chat-message-field" autocomplete="off" placeholder="Type a message..." class="bg-transparent flex-1 text-sm text-slate-200 outline-none">
                    <button type="submit" class="p-1.5 bg-indigo-500 hover:bg-indigo-600 text-white rounded-lg transition-all"><i data-lucide="send" class="w-3.5 h-3.5"></i></button>
                </form>
            </div>
        </main>
    </div>

    <div id="modal-my-profile" class="fixed inset-0 z-50 bg-black/70 backdrop-blur-md flex items-center justify-center p-4 hidden">
        <div class="glass max-w-lg w-full rounded-2xl overflow-hidden shadow-2xl border border-slate-700/40" id="settings-card">
            <div class="relative h-32 bg-gradient-to-r from-indigo-600 to-purple-600" id="my-profile-banner-preview">
                <label class="absolute inset-0 bg-black/40 opacity-0 hover:opacity-100 flex items-center justify-center transition-all cursor-pointer text-xs font-medium gap-2">
                    <i data-lucide="camera" class="w-4 h-4"></i> Change Banner
                    <input type="file" id="edit-banner-file" accept="image/*" class="hidden">
                </label>
                <button onclick="toggleModal('modal-my-profile', false)" class="absolute top-3 right-3 p-1.5 bg-black/40 hover:bg-black/60 text-white rounded-full"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
            <div class="px-6 pb-6 relative pt-12">
                <div class="absolute -top-10 left-6 w-20 h-20 rounded-2xl overflow-hidden ring-4 ring-[#0f1626] bg-slate-800 relative group">
                    <img id="my-profile-avatar-preview" src="" class="w-full h-full object-cover">
                    <label class="absolute inset-0 bg-black/50 opacity-0 hover:opacity-100 flex items-center justify-center transition-all cursor-pointer text-white text-[10px]">
                        <i data-lucide="camera" class="w-4 h-4"></i>
                        <input type="file" id="edit-avatar-file" accept="image/*" class="hidden">
                    </label>
                </div>
                <div class="mt-4 space-y-4 text-left">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Display Name</label>
                            <input type="text" id="edit-my-displayname" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3.5 py-2 text-xs text-slate-100 focus:outline-none focus:border-indigo-500">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">@Handle Username</label>
                            <input type="text" id="edit-my-handle" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3.5 py-2 text-xs text-slate-100 focus:outline-none focus:border-indigo-500">
                        </div>
                    </div>
                    <p id="edit-profile-error" class="text-rose-400 text-xs hidden"></p>
                    <div class="pt-2 flex justify-end gap-3 border-t border-slate-800">
                        <button id="btn-save-my-profile" class="bg-indigo-500 hover:bg-indigo-600 text-white text-xs font-medium px-4 py-2 rounded-xl shadow-lg transition-all">Save Profile Changes</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-user-card" class="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm hidden flex items-center justify-center p-4">
        <div class="glass max-w-sm w-full rounded-2xl overflow-hidden relative border border-slate-800">
            <div class="h-24 bg-gradient-to-r from-indigo-500 to-purple-600" id="inspect-banner"></div>
            <button onclick="toggleModal('modal-user-card', false)" class="absolute top-3 right-3 p-1.5 bg-black/40 rounded-full text-white"><i data-lucide="x" class="w-4 h-4"></i></button>
            <div class="px-5 pb-5 pt-12 relative">
                <img id="inspect-avatar" src="" class="w-18 h-18 rounded-xl object-cover absolute -top-9 left-5 ring-4 ring-[#0f1524] bg-slate-800">
                <h3 id="inspect-name" class="font-bold text-base text-slate-100">User Profile</h3>
                <p id="inspect-handle" class="text-xs text-indigo-400 mb-2">@handle</p>
                <div id="inspect-action-container" class="pt-2 border-t border-slate-800"></div>
            </div>
        </div>
    </div>

    <div id="modal-create-server" class="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm hidden flex items-center justify-center p-4">
        <div class="glass max-w-sm w-full rounded-2xl p-6 border border-slate-800 space-y-4">
            <h3 class="font-bold text-base text-slate-200">Initialize Server Space</h3>
            <input type="text" id="srv-input-name" placeholder="Server Name" class="w-full bg-slate-900 border border-slate-700/60 rounded-xl px-3 py-2 text-sm text-slate-200 outline-none">
            <div class="flex justify-end gap-2 text-xs">
                <button onclick="toggleModal('modal-create-server', false)" class="px-3 py-2 bg-slate-800 rounded-lg">Cancel</button>
                <button id="btn-execute-create-server" class="px-3 py-2 bg-indigo-500 rounded-lg text-white">Create</button>
            </div>
        </div>
    </div>

    <div id="modal-create-channel" class="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm hidden flex items-center justify-center p-4">
        <div class="glass max-w-sm w-full rounded-2xl p-6 border border-slate-800 space-y-4">
            <h3 class="font-bold text-base text-slate-200">Create Node Channel</h3>
            <select id="chan-input-type" class="w-full bg-slate-900 border border-slate-700/60 rounded-xl px-3 py-2 text-sm text-slate-300 outline-none">
                <option value="text">Text Channel (#)</option>
                <option value="voice">Voice Channel (VC)</option>
            </select>
            <input type="text" id="chan-input-name" placeholder="channel-name" class="w-full bg-slate-900 border border-slate-700/60 rounded-xl px-3 py-2 text-sm text-slate-200 outline-none">
            <div class="flex justify-end gap-2 text-xs">
                <button onclick="toggleModal('modal-create-channel', false)" class="px-3 py-2 bg-slate-800 rounded-lg">Cancel</button>
                <button id="btn-execute-create-channel" class="px-3 py-2 bg-indigo-500 rounded-lg text-white">Deploy</button>
            </div>
        </div>
    </div>

    <div id="modal-join-server" class="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm hidden flex items-center justify-center p-4">
        <div class="glass max-w-sm w-full rounded-2xl p-6 border border-slate-800 space-y-4">
            <h3 class="font-bold text-base text-slate-200">Access Server Guild</h3>
            <input type="text" id="join-input-code" placeholder="SC-INV-XXXX" class="w-full bg-slate-900 border border-slate-700/60 rounded-xl px-3 py-2 text-sm text-slate-200 outline-none">
            <div class="flex justify-end gap-2 text-xs">
                <button onclick="toggleModal('modal-join-server', false)" class="px-3 py-2 bg-slate-800 rounded-lg">Cancel</button>
                <button id="btn-execute-join" class="px-3 py-2 bg-indigo-500 rounded-lg text-white">Join</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, deleteDoc, updateDoc, arrayUnion, collection, addDoc, query, where, orderBy, onSnapshot, limit } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMAiYmLy2k5feaWbUHE7n5TUNlZGAr6nk",
            authDomain: "speechcentor.firebaseapp.com",
            projectId: "speechcentor",
            storageBucket: "speechcentor.firebasestorage.app",
            messagingSenderId: "804696408540",
            appId: "1:804696408540:web:855cae2217b55dca0a4f19"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let myUserData = null;
        let activeContext = "dm-hub";
        let activeChannelId = null;
        let isRegistering = false;

        let unsubChannels = null;
        let unsubMessages = null;

        window.toggleModal = (id, show) => { document.getElementById(id).classList.toggle('hidden', !show); };

        // AUTH SPLIT INTERCEPTOR ROUTER
        document.getElementById('btn-auth-toggle').addEventListener('click', () => {
            isRegistering = !isRegistering;
            document.getElementById('auth-title').textContent = isRegistering ? "Register Account" : "Access SpeechCentor";
            document.getElementById('auth-register-fields').classList.toggle('hidden', !isRegistering);
            document.getElementById('btn-auth-primary').textContent = isRegistering ? "Register" : "Sign In";
        });

        document.getElementById('btn-auth-primary').addEventListener('click', async () => {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            const errorEl = document.getElementById('auth-error');
            errorEl.classList.add('hidden');

            if (!email || !password) { errorEl.textContent = "Fields incomplete."; errorEl.classList.remove('hidden'); return; }

            try {
                if (isRegistering) {
                    const dispName = document.getElementById('auth-displayname').value.trim();
                    const handleInput = document.getElementById('auth-handle').value.trim().toLowerCase().replace(/[@\s]/g, "");

                    if (!dispName || !handleInput) { errorEl.textContent = "Registration details missing."; errorEl.classList.remove('hidden'); return; }
                    if (!/^[a-zA-Z0-9_]+$/.test(handleInput)) { errorEl.textContent = "Handle format error."; errorEl.classList.remove('hidden'); return; }

                    const reservedSnap = await getDoc(doc(db, "usernames", handleInput));
                    if (reservedSnap.exists()) { errorEl.textContent = "Username taken."; errorEl.classList.remove('hidden'); return; }

                    const credential = await createUserWithEmailAndPassword(auth, email, password);
                    const systemUid = `SC-${Math.floor(1000 + Math.random() * 9000)}`;
                    
                    const newProfile = {
                        userId: systemUid,
                        uid: credential.user.uid,
                        username: handleInput,
                        displayName: dispName,
                        avatarUrl: `https://api.dicebear.com/7.x/identicon/svg?seed=${handleInput}`,
                        bannerUrl: "linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%)"
                    };

                    await setDoc(doc(db, "usernames", handleInput), { uid: credential.user.uid });
                    await setDoc(doc(db, "users", credential.user.uid), newProfile);
                } else {
                    await signInWithEmailAndPassword(auth, email, password);
                }
            } catch (err) {
                errorEl.textContent = err.message; errorEl.classList.remove('hidden');
            }
        });

        document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));

        onAuthStateChanged(auth, async (fUser) => {
            if (fUser) {
                const docSnap = await getDoc(doc(db, "users", fUser.uid));
                if (docSnap.exists()) {
                    myUserData = docSnap.data();
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('app-container').classList.remove('hidden');
                    initAppDashboard();
                }
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-container').classList.add('hidden');
            }
        });

        function initAppDashboard() {
            updateGlobalUserHeaderUI();
            onSnapshot(query(collection(db, "servers"), where("members", "array-contains", auth.currentUser.uid)), (snapshot) => {
                const serverContainer = document.getElementById('server-list');
                serverContainer.innerHTML = "";
                snapshot.forEach(docNode => {
                    const data = docNode.data();
                    const srvId = docNode.id;
                    serverContainer.insertAdjacentHTML('beforeend', `
                        <button onclick="switchContext('server-${srvId}')" class="w-12 h-12 rounded-full bg-slate-800 text-slate-200 hover:bg-indigo-500 hover:text-white flex items-center justify-center font-bold text-sm transition-all group relative border border-slate-700/40">
                            ${data.name.charAt(0).toUpperCase()}
                            <span class="absolute left-20 bg-slate-950 px-2 py-1 rounded text-xs hidden group-hover:block whitespace-nowrap z-40">${data.name}</span>
                        </button>
                    `);
                });
            });
            switchContext("dm-hub");
        }

        function updateGlobalUserHeaderUI() {
            document.getElementById('my-displayname').textContent = myUserData.displayName;
            document.getElementById('my-handle').textContent = `@${myUserData.username}`;
            document.getElementById('my-avatar').src = myUserData.avatarUrl;
        }

        // WRITABLE PROFILE HANDLING PIPELINE CODES
        document.getElementById('btn-my-settings').addEventListener('click', () => {
            document.getElementById('edit-my-displayname').value = myUserData.displayName;
            document.getElementById('edit-my-handle').value = myUserData.username;
            document.getElementById('my-profile-avatar-preview').src = myUserData.avatarUrl;
            
            const bPreview = document.getElementById('my-profile-banner-preview');
            if (myUserData.bannerUrl.startsWith("data:") || myUserData.bannerUrl.startsWith("http")) {
                bPreview.style.background = `url('${myUserData.bannerUrl}') center/cover no-repeat`;
            } else { bPreview.style.background = myUserData.bannerUrl; }

            document.getElementById('edit-profile-error').classList.add('hidden');
            toggleModal('modal-my-profile', true);
            lucide.createIcons();
        });

        function processFileToUrl(file, maxW, maxH) {
            return new Promise((res) => {
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image(); img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        if (w > h) { if (w > maxW) { h *= maxW / w; w = maxW; } }
                        else { if (h > maxH) { w *= maxH / h; h = maxH; } }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        res(canvas.toDataURL('image/jpeg', 0.7));
                    };
                };
            });
        }

        document.getElementById('edit-avatar-file').addEventListener('change', async (e) => {
            if (e.target.files[0]) {
                const url = await processFileToUrl(e.target.files[0], 200, 200);
                document.getElementById('my-profile-avatar-preview').src = url;
            }
        });

        document.getElementById('edit-banner-file').addEventListener('change', async (e) => {
            if (e.target.files[0]) {
                const url = await processFileToUrl(e.target.files[0], 700, 250);
                document.getElementById('my-profile-banner-preview').style.background = `url('${url}') center/cover no-repeat`;
            }
        });

        document.getElementById('btn-save-my-profile').addEventListener('click', async () => {
            const nextDisp = document.getElementById('edit-my-displayname').value.trim();
            const nextHandle = document.getElementById('edit-my-handle').value.trim().toLowerCase().replace(/[@\s]/g, "");
            const pError = document.getElementById('edit-profile-error');
            pError.classList.add('hidden');

            if (!nextDisp || !nextHandle || !/^[a-zA-Z0-9_]+$/.test(nextHandle)) {
                pError.textContent = "Invalid entry criteria validation values."; pError.classList.remove('hidden'); return;
            }

            try {
                if (nextHandle !== myUserData.username) {
                    const checkFree = await getDoc(doc(db, "usernames", nextHandle));
                    if (checkFree.exists()) { pError.textContent = "Username taken."; pError.classList.remove('hidden'); return; }
                    
                    // Atomic transaction proxy re-allocation swap sequence
                    await deleteDoc(doc(db, "usernames", myUserData.username));
                    await setDoc(doc(db, "usernames", nextHandle), { uid: auth.currentUser.uid });
                }

                const updatedData = {
                    ...myUserData,
                    displayName: nextDisp,
                    username: nextHandle,
                    avatarUrl: document.getElementById('my-profile-avatar-preview').src,
                    bannerUrl: document.getElementById('my-profile-banner-preview').style.background.includes("url") ? 
                        document.getElementById('my-profile-banner-preview').style.background.slice(5, -2).replace(/"/g, "") : 
                        document.getElementById('my-profile-banner-preview').style.background
                };

                await setDoc(doc(db, "users", auth.currentUser.uid), updatedData);
                myUserData = updatedData;
                updateGlobalUserHeaderUI();
                toggleModal('modal-my-profile', false);
            } catch(e) { pError.textContent = e.message; pError.classList.remove('hidden'); }
        });

        // CONTEXT SWITCH ENGINE BLOCK MAPPING
        window.switchContext = (contextId) => {
            activeContext = contextId; activeChannelId = null;
            if (unsubChannels) unsubChannels();
            if (unsubMessages) unsubMessages();
            document.getElementById('server-action-controls').classList.add('hidden');
            document.getElementById('chat-input-bar').classList.add('hidden');
            clearChatViewport("Select an ecosystem communication array path.");

            if (contextId === "dm-hub") {
                document.getElementById('sidebar-header-title').innerHTML = `<span>SpeechCentor Hub</span>`;
                renderDmHubSidebar();
            } else if (contextId.startsWith("server-")) {
                document.getElementById('server-action-controls').classList.remove('hidden');
                renderServerSidebarLayoutPipeline(contextId.replace("server-", ""));
            }
        };

        async function renderServerSidebarLayoutPipeline(serverId) {
            const srvSnap = await getDoc(doc(db, "servers", serverId));
            if (!srvSnap.exists()) return;
            const srvData = srvSnap.data();

            document.getElementById('sidebar-header-title').innerHTML = `<span class="truncate pr-2">${srvData.name}</span> <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400"></i>`;
            
            // Server Owner validation permission engine check layer
            const isOwner = srvData.ownerId === auth.currentUser.uid;
            document.getElementById('btn-create-channel-modal').classList.toggle('hidden', !isOwner);

            document.getElementById('btn-gen-invite').onclick = () => generateServerInviteToken(serverId);
            document.getElementById('btn-create-channel-modal').onclick = () => toggleModal('modal-create-channel', true);
            document.getElementById('btn-execute-create-channel').onclick = () => deployServerChannelNode(serverId);

            unsubChannels = onSnapshot(query(collection(db, "channels"), where("serverId", "==", serverId)), (snap) => {
                const sidebar = document.getElementById('sidebar-context-content');
                sidebar.innerHTML = `<div class="space-y-4"><div><div class="text-[10px] font-bold text-slate-500 uppercase tracking-wider px-2 mb-1">Text Channels</div><div id="srv-text-chans" class="space-y-0.5"></div></div><div><div class="text-[10px] font-bold text-slate-500 uppercase tracking-wider px-2 mb-1">Voice Channels</div><div id="srv-voice-chans" class="space-y-0.5"></div></div></div>`;
                const tBox = document.getElementById('srv-text-chans'), vBox = document.getElementById('srv-voice-chans');
                
                snap.forEach(d => {
                    const c = d.data(), cid = d.id;
                    if (c.type === "text") {
                        tBox.insertAdjacentHTML('beforeend', `<div onclick="switchServerChannel('${cid}', '${c.name}', 'text')" class="flex items-center gap-2 px-2 py-1.5 hover:bg-slate-800/30 rounded-xl cursor-pointer text-xs text-slate-300 font-medium truncate"><i data-lucide="hash" class="w-3.5 h-3.5 text-slate-500"></i><span>${c.name}</span></div>`);
                    } else {
                        vBox.insertAdjacentHTML('beforeend', `<div onclick="switchServerChannel('${cid}', '${c.name}', 'voice')" class="flex items-center justify-between px-2 py-1.5 hover:bg-slate-800/30 rounded-xl cursor-pointer text-xs text-slate-300 font-medium truncate"><div class="flex items-center gap-2"><i data-lucide="volume-2" class="w-3.5 h-3.5 text-emerald-500"></i><span>${c.name}</span></div><span class="text-[9px] bg-emerald-500/10 text-emerald-400 px-1.5 py-0.5 rounded-full font-bold">Live</span></div>`);
                    }
                });
                lucide.createIcons();
            });
        }

        async function deployServerChannelNode(serverId) {
            const nameInput = document.getElementById('chan-input-name').value.trim().toLowerCase().replace(/\s+/g, '-');
            const typeSelect = document.getElementById('chan-input-type').value;
            if (!nameInput) return;
            await addDoc(collection(db, "channels"), { serverId, name: nameInput, type: typeSelect });
            toggleModal('modal-create-channel', false); document.getElementById('chan-input-name').value = "";
        }

        window.switchServerChannel = (channelId, name, type) => {
            activeChannelId = channelId; if (unsubMessages) unsubMessages();
            document.getElementById('main-header-title').textContent = type === 'text' ? `#${name}` : `🔊 ${name}`;
            if (type === 'text') {
                document.getElementById('chat-input-bar').classList.remove('hidden');
                streamChatLogsPipeline("serverMessages", "channelId");
            } else {
                document.getElementById('chat-input-bar').classList.add('hidden');
                clearChatViewport(`Connected to voice sector: ${name}. Audio routing ready.`);
            }
        };

        function streamChatLogsPipeline(coll, pivot) {
            unsubMessages = onSnapshot(query(collection(db, coll), where(pivot, "==", activeChannelId), orderBy("timestamp", "asc"), limit(60)), (snap) => {
                const viewport = document.getElementById('chat-viewport-messages'); viewport.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    viewport.insertAdjacentHTML('beforeend', `
                        <div class="flex items-start gap-3 hover:bg-slate-900/20 p-1.5 rounded-xl group">
                            <img onclick="inspectUserProfile('${data.senderUid}')" src="${data.senderAvatar}" class="w-9 h-9 rounded-xl object-cover bg-slate-800 cursor-pointer hover:scale-105 transition-all">
                            <div class="min-w-0 flex-1">
                                <div class="flex items-baseline gap-1.5 mb-0.5">
                                    <span class="font-semibold text-xs text-slate-200">${data.senderName}</span>
                                    <span class="text-[10px] text-indigo-400">@${data.senderHandle}</span>
                                </div>
                                <p class="text-xs text-slate-300 break-words">${data.text}</p>
                            </div>
                        </div>
                    `);
                });
                viewport.scrollTop = viewport.scrollHeight;
            });
        }

        document.getElementById('chat-form').addEventListener('submit', async (e) => {
            e.preventDefault(); const f = document.getElementById('chat-message-field'); const msg = f.value.trim();
            if (!msg || !activeChannelId) return; f.value = "";
            const isDm = activeContext === "dm-hub";
            await addDoc(collection(db, isDm ? "dmMessages" : "serverMessages"), {
                [isDm ? "dmId" : "channelId"]: activeChannelId, text: msg, senderUid: auth.currentUser.uid,
                senderName: myUserData.displayName, senderHandle: myUserData.username, senderAvatar: myUserData.avatarUrl, timestamp: Date.now()
            });
        });

        // FRIENDS LOGIC MODULE BOOTSTRAPPING
        function renderDmHubSidebar() {
            const s = document.getElementById('sidebar-context-content');
            s.innerHTML = `<div class="space-y-4"><div><div class="text-[10px] font-bold text-slate-500 uppercase tracking-wider px-2 mb-1">Add Friend</div><div class="flex gap-1 px-1"><input type="text" id="input-friend-handle" placeholder="handle" class="bg-slate-900 border border-slate-800 text-xs rounded-lg px-2 py-1.5 flex-1 outline-none text-slate-200"><button id="btn-send-friend-req" class="bg-indigo-500 p-1.5 rounded-lg text-white"><i data-lucide="user-plus" class="w-3.5 h-3.5"></i></button></div><p id="friend-req-feedback" class="text-[10px] px-2 mt-1 hidden"></p></div><div class="w-full h-[1px] bg-slate-900"></div><div><div class="text-[10px] font-bold text-slate-500 uppercase tracking-wider px-2 mb-1">Clearance Requests</div><div id="pending-requests-box" class="space-y-1"></div></div><div class="w-full h-[1px] bg-slate-900"></div><div><div class="text-[10px] font-bold text-slate-500 uppercase tracking-wider px-2 mb-1">Direct Secure Lines</div><div id="friends-list-box" class="space-y-1"></div></div></div>`;
            lucide.createIcons();
            document.getElementById('btn-send-friend-req').addEventListener('click', dispatchFriendReq);

            onSnapshot(query(collection(db, "friendRequests"), where("receiverId", "==", auth.currentUser.uid), where("status", "==", "pending")), (snap) => {
                const b = document.getElementById('pending-requests-box'); b.innerHTML = snap.empty ? `<p class="text-[10px] text-slate-600 px-2 italic">None.</p>` : "";
                snap.forEach(d => { const r = d.data(); b.insertAdjacentHTML('beforeend', `<div class="flex items-center justify-between p-1.5 bg-slate-900/40 border border-slate-800/50 rounded-xl"><span class="text-xs text-slate-300 truncate">@${r.senderUsername}</span><button onclick="acceptFriend('${d.id}', '${r.senderId}', '${r.senderUsername}')" class="p-1 bg-emerald-500/20 text-emerald-400 rounded"><i data-lucide="check" class="w-3 h-3"></i></button></div>`); });
                lucide.createIcons();
            });

            onSnapshot(query(collection(db, "friends"), where("users", "array-contains", auth.currentUser.uid)), (snap) => {
                const b = document.getElementById('friends-list-box'); b.innerHTML = snap.empty ? `<p class="text-[10px] text-slate-600 px-2 italic">None.</p>` : "";
                snap.forEach(d => {
                    const r = d.data(), tUid = r.user1 === auth.currentUser.uid ? r.user2 : r.user1, tName = r.user1 === auth.currentUser.uid ? r.user2Username : r.user1Username;
                    b.insertAdjacentHTML('beforeend', `<div onclick="initiateDmSession('${tUid}', '${tName}')" class="flex items-center gap-2 p-1.5 hover:bg-slate-800/30 rounded-xl cursor-pointer"><i data-lucide="user" class="w-3.5 h-3.5 text-slate-500"></i><span class="text-xs text-slate-300 truncate">@${tName}</span></div>`);
                });
                lucide.createIcons();
            });
        }

        async function dispatchFriendReq() {
            const h = document.getElementById('input-friend-handle').value.trim().toLowerCase().replace(/[@\s]/g, "");
            const f = document.getElementById('friend-req-feedback'); f.classList.add('hidden');
            if (!h || h === myUserData.username) return;

            const snap = await getDoc(doc(db, "usernames", h));
            if (!snap.exists()) { f.textContent = "Operator unassigned."; f.className="text-[10px] px-2 mt-1 text-rose-400"; f.classList.remove('hidden'); return; }

            const tUid = snap.data().uid; const tKey = [auth.currentUser.uid, tUid].sort().join("_");
            await setDoc(doc(db, "friendRequests", tKey), { senderId: auth.currentUser.uid, senderUsername: myUserData.username, receiverId: tUid, status: "pending" });
            f.textContent = "Dispatched."; f.className="text-[10px] px-2 mt-1 text-emerald-400"; f.classList.remove('hidden');
        }

        window.acceptFriend = async (rid, sId, sName) => {
            const fKey = [auth.currentUser.uid, sId].sort().join("_");
            await setDoc(doc(db, "friends", fKey), { users: [auth.currentUser.uid, sId], user1: auth.currentUser.uid, user1Username: myUserData.username, user2: sId, user2Username: sName });
            await setDoc(doc(db, "friendRequests", rid), { status: "approved" }, { merge: true });
        };

        window.initiateDmSession = async (tUid, tName) => {
            activeChannelId = [auth.currentUser.uid, tUid].sort().join("_");
            await setDoc(doc(db, "dms", activeChannelId), { user1: auth.currentUser.uid, user2: tUid }, { merge: true });
            document.getElementById('main-header-title').textContent = `@${tName}`;
            document.getElementById('chat-input-bar').classList.remove('hidden');
            streamChatLogsPipeline("dmMessages", "dmId");
        };

        window.inspectUserProfile = async (uid) => {
            const s = await getDoc(doc(db, "users", uid)); if (!s.exists()) return; const u = s.data();
            document.getElementById('inspect-name').textContent = u.displayName;
            document.getElementById('inspect-handle').textContent = `@${u.username}`;
            document.getElementById('inspect-avatar').src = u.avatarUrl;
            document.getElementById('inspect-banner').style.background = u.bannerUrl;

            const container = document.getElementById('inspect-action-container'); container.innerHTML = "";
            if (uid !== auth.currentUser.uid) {
                const fKey = [auth.currentUser.uid, uid].sort().join("_"); const fSnap = await getDoc(doc(db, "friends", fKey));
                if (fSnap.exists()) {
                    container.innerHTML = `<button onclick="toggleModal('modal-user-card', false); initiateDmSession('${uid}', '${u.username}')" class="w-full bg-indigo-500 py-1.5 rounded-xl text-xs font-medium">Message Secure Line</button>`;
                } else {
                    container.innerHTML = `<button onclick="toggleModal('modal-user-card', false); switchContext('dm-hub');" class="w-full bg-slate-800 py-1.5 rounded-xl text-xs text-slate-300">Request via DM Hub</button>`;
                }
            } else { container.innerHTML = `<p class="text-center text-[10px] text-slate-500 italic">Self core cluster record.</p>`; }
            toggleModal('modal-user-card', true); lucide.createIcons();
        };

        // INVITES & UTILITIES
        async function generateServerInviteToken(serverId) {
            const code = `SC-INV-${Math.random().toString(36).substring(2, 8).toUpperCase()}`;
            await setDoc(doc(db, "invites", code), { serverId, expiresAt: Date.now() + (30 * 24 * 60 * 60 * 1000) });
            prompt("Temporary invite key string deployed (Valid for 30 days):", code);
        }

        document.getElementById('btn-execute-join').addEventListener('click', async () => {
            const code = document.getElementById('join-input-code').value.trim(); if (!code) return;
            const s = await getDoc(doc(db, "invites", code));
            if (!s.exists() || Date.now() > s.data().expiresAt) { alert("Invalid or expired invite."); return; }
            await updateDoc(doc(db, "servers", s.data().serverId), { members: arrayUnion(auth.currentUser.uid) });
            toggleModal('modal-join-server', false); document.getElementById('join-input-code').value = "";
            switchContext(`server-${s.data().serverId}`);
        });

        document.getElementById('btn-execute-create-server').addEventListener('click', async () => {
            const n = document.getElementById('srv-input-name').value.trim(); if (!n) return;
            const ref = await addDoc(collection(db, "servers"), { name: n, ownerId: auth.currentUser.uid, members: [auth.currentUser.uid] });
            await addDoc(collection(db, "channels"), { serverId: ref.id, name: "general", type: "text" });
            toggleModal('modal-create-server', false); document.getElementById('srv-input-name').value = "";
            switchContext(`server-${ref.id}`);
        });

        function clearChatViewport(t) {
            document.getElementById('chat-viewport-messages').innerHTML = `<div class="h-full flex flex-col items-center justify-center text-center p-6 text-slate-500"><i data-lucide="activity" class="w-10 h-10 mb-2 text-slate-800"></i><p class="text-xs max-w-xs">${t}</p></div>`;
            lucide.createIcons();
        }

        document.getElementById('btn-create-server-trigger').onclick = () => toggleModal('modal-create-server', true);
        document.getElementById('btn-join-server-trigger').onclick = () => toggleModal('modal-join-server', true);
        document.getElementById('nav-dm-hub').onclick = () => switchContext('dm-hub');
    </script>
</body>
</html>
